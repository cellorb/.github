name: Feature Task
description: Feature Issueに紐づくサブIssue（実装タスク単位）。1タスク1PR・200行以下を原則とする。
title: "[Task] "
labels:
  - task
body:
  - type: input
    id: parent_issue
    attributes:
      label: 親Issue
      placeholder: "#xxx"
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: やること
      placeholder: 例：rest-api に POST /xxx エンドポイントを追加する
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: 実装方針
      placeholder: |
        - XXXパッケージにハンドラを追加
        - バリデーションはYYYで行う
    validations:
      required: false

  - type: textarea
    id: test_plan
    attributes:
      label: テスト方針
      placeholder: |
        - POST /xxx に正常なリクエストを送ると201が返ること
        - バリデーションエラー時は400が返ること
    validations:
      required: false

  - type: textarea
    id: done_criteria
    attributes:
      label: 完了条件
      placeholder: |
        - [ ] 実装完了
        - [ ] テスト追加・全パス
        - [ ] lintパス
        - [ ] PRが200行以下
        - [ ] PRマージ済み
    validations:
      required: true
