name: Architecture / Tech Task
description: 設計課題・未解決の技術タスクを管理する
title: "[TechTask] "
labels:
  - tech-task
body:
  - type: textarea
    id: current_state
    attributes:
      label: 現状
      placeholder: 例：rest-api/internal/server/middleware/auth.go の InternalAuth が no-op
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: やるべきこと
      placeholder: |
        - 案1: 共有シークレット方式
        - 案2: JWTベース方式
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 影響範囲
      placeholder: |
        - rest-api/internal/server/middleware/auth.go
        - front-api/internal/driver/restapi/client.go
    validations:
      required: true

  - type: textarea
    id: done_criteria
    attributes:
      label: 完了条件
      placeholder: |
        - [ ] 実装完了
        - [ ] テスト追加・パス
        - [ ] lintパス
        - [ ] ドキュメント更新
    validations:
      required: true
