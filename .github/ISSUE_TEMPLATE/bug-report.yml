name: Bug Report
description: バグ報告・修正依頼のテンプレート
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1. XXXページを開く
        2. YYYボタンを押す
        3. ZZZと表示される
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      placeholder: 例：ZZZではなくAAAが表示されるべき
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: エラーメッセージやスクショがあれば添付
      placeholder: 例：500エラーが返る / 画面が真っ白になる
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: 原因・調査メモ
      placeholder: 例：XXXのバリデーションが抜けている
    validations:
      required: false

  - type: textarea
    id: done_criteria
    attributes:
      label: 完了条件
      placeholder: |
        - [ ] バグが修正されている
        - [ ] 再現テスト追加・パス
        - [ ] lintパス
        - [ ] PRマージ済み
    validations:
      required: true
